name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-2022
            rust_target: x86_64-pc-windows-msvc
            python_arch: x64
          - arch: arm64
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            python_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python_arch }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup default stable
          rustup target add ${{ matrix.rust_target }}
          cargo --version
          rustc -Vv

      - name: Show toolchain architecture
        shell: pwsh
        run: |
          python -c "import platform, sys; print(sys.version); print(platform.machine())"
          Write-Host "PROCESSOR_ARCHITECTURE=$env:PROCESSOR_ARCHITECTURE"

      - name: Prepare native/tool environment
        shell: pwsh
        run: |
          .\scripts\setup_windows_dev.ps1 -IncludeBuildDeps -Arch ${{ matrix.arch }}

      - name: Build Windows package
        shell: pwsh
        run: |
          .\scripts\build_windows.ps1 -SkipTests -Arch ${{ matrix.arch }}

      - name: Verify package architecture
        shell: pwsh
        run: |
          $packageRoot = if ("${{ matrix.arch }}" -eq "x64") { "dist\packrelic" } else { "dist\packrelic-${{ matrix.arch }}" }
          .\scripts\verify_windows_package_arch.ps1 -PackageRoot $packageRoot -Arch ${{ matrix.arch }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: packrelic-windows-${{ matrix.arch }}
          path: release/packrelic-windows-${{ matrix.arch }}-*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(find artifacts -type f -name 'packrelic-windows-*.zip' | sort)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No release packages found." >&2
            exit 1
          fi

          notes="Automated PackRelic Windows build for ${TAG_NAME}."
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${packages[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${packages[@]}" --title "${TAG_NAME}" --notes "${notes}"
          fi
